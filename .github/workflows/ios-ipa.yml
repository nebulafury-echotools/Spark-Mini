name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter packages
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS app without codesigning
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -qry Spark-Mini-unsigned.ipa Payload

      - name: Package source code
        run: git archive --format=zip --output Spark-Mini-source.zip HEAD

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Spark-Mini-unsigned-iOS-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload source code
        uses: actions/upload-artifact@v4
        with:
          name: Spark-Mini-source-code
          path: Spark-Mini-source.zip
          if-no-files-found: error

      - name: Upload iOS archive logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: build/ios
          if-no-files-found: ignore
